spring.application.name=order-manager

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/order_manager
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# External SOAP integration
integration.soap.base-url=http://external-soap-api.example.com

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
# Retry logic enabled
spring.rabbitmq.listener.simple.retry.enabled=true
# Max number of attempts
spring.rabbitmq.listener.simple.retry.max-attempts=3
# Initial-interval between attempts (3 sec)
spring.rabbitmq.listener.simple.retry.initial-interval=3000ms
# (3s -> 6s -> ...)
spring.rabbitmq.listener.simple.retry.multiplier=2.0
# Max interval limit between 2 attempts
spring.rabbitmq.listener.simple.retry.max-interval=10000ms
